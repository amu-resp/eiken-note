<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #3b4cc0 0%, #5b6ee0 60%, #7a8cf0 100%);
    padding: 20px;
  }
  .card {
    background: #fff; border-radius: 18px; padding: 36px 28px;
    max-width: 380px; width: 100%; text-align: center;
    box-shadow: 0 10px 40px rgba(20, 25, 60, .3);
  }
  .emoji { font-size: 3rem; }
  h1 { font-size: 1.3rem; margin: 10px 0 4px; color: #1e2433; }
  .sub { font-size: .9rem; color: #6b7280; margin-bottom: 20px; }
  input[type="password"] {
    width: 100%; padding: 12px 14px; font-size: 1.1rem; text-align: center;
    border: 2px solid #cdd4e3; border-radius: 10px; font-family: inherit;
  }
  input[type="password"]:focus { outline: none; border-color: #4355c8; }
  .remember { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: .85rem; color: #4b5563; margin: 14px 0; cursor: pointer; }
  button {
    width: 100%; padding: 13px; font-size: 1.05rem; font-weight: 700;
    background: #4355c8; color: #fff; border: none; border-radius: 10px;
    cursor: pointer; font-family: inherit;
  }
  button:hover { opacity: .9; }
  .err { color: #d64550; font-size: .88rem; margin-top: 12px; min-height: 1.4em; font-weight: 600; }
  .loading { color: #0e9488; }
</style>
</head>

const KEY_STORE = 'eiken-gate-key-v1';

function b64(s) {
  const bin = atob(s);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

async function deriveKey(pw) {
  const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: b64(PAYLOAD.salt), iterations: 300000, hash: 'SHA-256' },
    km, { name: 'AES-GCM', length: 256 }, true, ['decrypt']
  );
}

async function openWith(key) {
  const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64(PAYLOAD.iv) }, key, b64(PAYLOAD.data));
  const html = new TextDecoder().decode(pt);
  document.open();
  document.write(html);
  document.close();
}

async function tryPassword() {
  const pw = document.getElementById('pw').value;
  const msg = document.getElementById('msg');
  if (!pw) { msg.textContent = 'あいことばを入れてね'; return; }
  msg.className = 'err loading';
  msg.textContent = 'ひらいています…';
  try {
    const key = await deriveKey(pw);
    if (document.getElementById('remember').checked) {
      const raw = await crypto.subtle.exportKey('raw', key);
      localStorage.setItem(KEY_STORE, btoa(String.fromCharCode(...new Uint8Array(raw))));
    }
    await openWith(key);
  } catch (e) {
    msg.className = 'err';
    msg.textContent = 'あいことばがちがうみたい。もういちど！';
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
  }
}

document.getElementById('open-btn').addEventListener('click', tryPassword);
document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') tryPassword(); });

(async () => {
  const saved = localStorage.getItem(KEY_STORE);
  if (!saved) return;
  try {
    const key = await crypto.subtle.importKey('raw', b64(saved), { name: 'AES-GCM' }, false, ['decrypt']);
    document.getElementById('msg').className = 'err loading';
    document.getElementById('msg').textContent = 'ひらいています…';
    await openWith(key);
  } catch (e) {
    localStorage.removeItem(KEY_STORE);
    document.getElementById('msg').textContent = '';
  }
})();
</script>
